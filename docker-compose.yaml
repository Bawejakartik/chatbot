version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: chat_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: qwerty
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: chat_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: qwerty
      ME_CONFIG_MONGODB_SERVER: mongo
    depends_on:
      - mongo

  backend:
    build: ./server
    container_name: chat_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      MONGO_URL: mongodb://admin:qwerty@mongo:27017/
      NODE_ENV: production
    depends_on:
      - mongo

  frontend:
    build: ./client
    container_name: chat_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  mongo_data:
